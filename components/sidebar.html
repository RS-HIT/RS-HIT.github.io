<!-- 左侧边栏组件 -->
<aside id="sidebar">
  <div class="sidebar-container">
    <!-- 用户信息区域 -->
    <div class="user-profile">
      <img src="avatar.jpg" alt="用户头像" class="sidebar-avatar" id="sidebarAvatar">
      <h3 class="username" id="userName">
        <!-- 提示：在此处填写用户名 -->
        Your Name
      </h3>
      <div class="page-views">
        📊 浏览量: <span id="viewCount">1,234</span>
      </div>
    </div>
    
    <!-- 联系信息区域 -->
    <div class="contact-info">
      <div class="contact-item">
        <span class="contact-emoji">🔗</span>
        <a href="https://github.com/YOUR_USERNAME" target="_blank" id="githubLink">
          <!-- 提示：在此处填写GitHub用户名 -->
          GitHub Profile
        </a>
      </div>
      
      <div class="contact-item">
        <span class="contact-emoji">📧</span>
        <a href="mailto:your.email@example.com" id="emailLink">
          <!-- 提示：在此处填写邮箱地址 -->
          your.email@example.com
        </a>
      </div>
      
      <div class="contact-item">
        <span class="contact-emoji">🎓</span>
        <span id="education">
          <!-- 提示：在此处填写教育经历 -->
          Your University Name<br>
          Your Major
        </span>
      </div>
      
      <div class="contact-item">
        <span class="contact-emoji">📍</span>
        <span id="location">
          <!-- 提示：在此处填写所在地 -->
          Your Location
        </span>
      </div>
      
      <div class="contact-item">
        <span class="contact-emoji">💼</span>
        <span id="occupation">
          <!-- 提示：在此处填写职业/身份 -->
          Your Title/Occupation
        </span>
      </div>
    </div>
    
    <!-- 技能标签云 -->
    <div class="skills-section">
      <h4>🛠️ 技术栈</h4>
      <div class="skills-tags" id="skillsTags">
        <!-- 提示：在此处添加技能标签 -->
        <span class="skill-tag">Python</span>
        <span class="skill-tag">JavaScript</span>
        <span class="skill-tag">React</span>
        <span class="skill-tag">Node.js</span>
        <!-- 可继续添加更多技能标签 -->
      </div>
    </div>
  </div>
</aside>
