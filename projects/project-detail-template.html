<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情页模板</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <!-- 项目详情页内容 -->
        <div class="page-content" id="projectDetail">
            <!-- 返回按钮 -->
            <div class="project-detail-header">
                <button class="back-btn" onclick="showPage('projects')">← 返回项目列表</button>
                <div class="project-status">
                    <span class="status-badge active" id="projectStatus">开发中</span>
                    <span class="last-updated">最后更新: <span id="lastUpdated">2025-01-26</span></span>
                </div>
            </div>

            <!-- 项目基本信息 -->
            <div class="project-detail-info">
                <div class="project-header-section">
                    <div class="project-title-area">
                        <h1 id="projectDetailTitle">项目名称</h1>
                        <p class="project-subtitle project-detail-description" id="projectDetailSubtitle">
                            项目描述和核心功能介绍
                        </p>
                        <div class="project-meta-info">
                            <div class="project-detail-tags" id="projectTags">
                                <span class="tag">React</span>
                                <span class="tag">Node.js</span>
                                <span class="tag">MongoDB</span>
                            </div>
                            <div class="project-status">
                                <span class="status-badge in-progress">开发中</span>
                                <span class="project-start-date">开始日期: 2025-01-15</span>
                            </div>
                        </div>
                        <div class="project-progress">
                            <div class="progress-container">
                                <div class="progress-bar" style="width: 75%;"></div>
                            </div>
                            <span class="progress-text">75%</span>
                        </div>
                        <div class="project-action-links">
                            <a href="#" class="demo-link btn-primary">🔗 在线演示</a>
                            <a href="#" class="github-link btn-secondary">📂 查看源码</a>
                        </div>
                    </div>
                    <div class="project-image-large">
                        <img src="../pic/project-detail.jpg" alt="项目详情图" id="projectDetailImage">
                    </div>
                </div>
            </div>

            <!-- 学习日志部分 -->
            <div class="learning-journal-section">
                <div class="journal-header">
                    <h2>📝 学习日志</h2>
                    <button class="add-journal-btn" onclick="showAddJournalForm()">+ 添加学习日志</button>
                </div>

                <!-- 日志表单 -->
                <div class="add-journal-form" id="addJournalForm" style="display: none;">
                    <form onsubmit="addJournalEntry(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="journalDate">日期</label>
                                <input type="date" id="journalDate" required>
                            </div>
                            <div class="form-group">
                                <label for="journalType">类型</label>
                                <select id="journalType" required>
                                    <option value="development">开发进展</option>
                                    <option value="learning">学习心得</option>
                                    <option value="bug">问题解决</option>
                                    <option value="idea">想法记录</option>
                                    <option value="milestone">里程碑</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="journalTitle">标题</label>
                            <input type="text" id="journalTitle" placeholder="输入日志标题" required>
                        </div>
                        <div class="form-group">
                            <label for="journalContent">内容</label>
                            <textarea id="journalContent" rows="8" placeholder="详细描述学习内容、遇到的问题、解决方案等..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="journalTags">标签</label>
                            <input type="text" id="journalTags" placeholder="用逗号分隔多个标签，如：React, JavaScript, 调试">
                        </div>
                        <div class="form-actions">
                            <button type="button" class="cancel-btn" onclick="hideAddJournalForm()">取消</button>
                            <button type="submit" class="save-btn">保存日志</button>
                        </div>
                    </form>
                </div>

                <!-- 日志条目容器 -->
                <div class="journal-entries" id="journalEntries">
                    <!-- 动态加载的日志条目将显示在这里 -->
                </div>

                <!-- 日志统计 -->
                <div class="journal-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalJournals">0</span>
                        <span class="stat-label">总日志数</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="journalDays">0</span>
                        <span class="stat-label">学习天数</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="lastJournalDays">0</span>
                        <span class="stat-label">距上次记录</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/journal.js"></script>
</body>
</html>
